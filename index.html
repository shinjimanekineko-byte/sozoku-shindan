<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相続かんたん診断 | 司法書士藤井真司事務所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-light: #243258;
    --gold: #c4933f;
    --gold-light: #e8c07a;
    --cream: #faf7f2;
    --cream-dark: #f0ebe0;
    --text: #2c2c2c;
    --text-light: #666;
    --border: #ddd5c5;
    --user-bg: #1a2744;
    --ai-bg: #ffffff;
    --shadow: 0 4px 24px rgba(26,39,68,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }

  /* Header */
  .header {
    width: 100%; background: var(--navy);
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .header-icon {
    width: 40px; height: 40px; background: var(--gold); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Noto Serif JP', serif; font-size: 14px; font-weight: 700;
    color: #fff; letter-spacing: 0.04em;
  }
  .header-text p { font-size: 10px; color: var(--gold-light); margin-top: 1px; }
  .header-tel { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; }
  .header-tel a {
    color: var(--gold-light); font-size: 14px; font-weight: 700;
    text-decoration: none; letter-spacing: 0.04em;
  }
  .header-tel span { font-size: 9px; color: rgba(255,255,255,0.45); margin-top: 1px; }

  /* Main */
  .main { width: 100%; max-width: 720px; flex: 1; display: flex; flex-direction: column; padding: 0 14px 90px; }

  /* Intro */
  .intro-card {
    background: var(--navy); border-radius: 0 0 16px 16px;
    padding: 22px 22px 18px; color: #fff; margin-bottom: 18px;
    position: relative; overflow: hidden;
  }
  .intro-card::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(196,147,63,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  .intro-card h2 {
    font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 700;
    color: #fff; letter-spacing: 0.04em; margin-bottom: 7px; line-height: 1.5;
  }
  .intro-card p { font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.8; }
  .steps { display: flex; gap: 6px; margin-top: 13px; flex-wrap: wrap; }
  .step {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(196,147,63,0.4);
    border-radius: 8px; padding: 5px 9px; font-size: 11px; color: var(--gold-light);
    display: flex; align-items: center; gap: 5px;
  }
  .step-num {
    background: var(--gold); color: var(--navy); width: 16px; height: 16px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; flex-shrink: 0;
  }

  /* Chat */
  .chat-area { display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.ai .msg-avatar  { background: var(--navy); }
  .msg.user .msg-avatar{ background: var(--gold); }
  .msg-bubble {
    max-width: 82%; padding: 13px 16px; border-radius: 16px; line-height: 1.8; font-size: 14px;
    white-space: pre-wrap;
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg); border: 1px solid var(--border);
    border-top-left-radius: 4px; box-shadow: var(--shadow); color: var(--text);
  }
  .msg.user .msg-bubble { background: var(--user-bg); color: #fff; border-top-right-radius: 4px; }

  /* Single choice */
  .choices { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
  .choice-btn {
    background: var(--cream-dark); border: 1.5px solid var(--border);
    color: var(--navy); font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; padding: 7px 14px; border-radius: 24px;
    cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .choice-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* Asset multi-select */
  .asset-picker {
    background: #fff; border: 1px solid var(--border); border-radius: 14px;
    padding: 15px 16px; box-shadow: var(--shadow); width: 100%;
  }
  .asset-picker-title { font-size: 11.5px; color: var(--text-light); margin-bottom: 10px; }
  .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 11px; }
  .asset-item {
    display: flex; align-items: center; gap: 8px; padding: 9px 11px;
    border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer;
    transition: all 0.18s; user-select: none; background: var(--cream);
  }
  .asset-item:hover { border-color: var(--navy); }
  .asset-item.selected { border-color: var(--gold); background: #fff9ee; box-shadow: 0 0 0 2px rgba(196,147,63,0.15); }
  .asset-item input[type=checkbox] { display: none; }
  .asset-check {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border);
    background: #fff; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.18s; font-size: 11px;
  }
  .asset-item.selected .asset-check { background: var(--gold); border-color: var(--gold); color: #fff; }
  .asset-label { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .asset-sub   { font-size: 10px; color: var(--text-light); margin-top: 1px; }
  .asset-confirm {
    width: 100%; background: var(--navy); color: #fff; border: none;
    border-radius: 9px; padding: 10px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .asset-confirm:hover { background: var(--navy-light); }
  .asset-confirm:disabled { background: #ccc; cursor: not-allowed; }

  /* Result */
  .result-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
  .result-header { background: var(--navy); padding: 13px 18px; display: flex; align-items: center; gap: 9px; }
  .result-header span { font-family: 'Noto Serif JP', serif; color: #fff; font-size: 15px; font-weight: 600; }
  .result-body { padding: 15px 18px; }
  .r-section { margin-bottom: 14px; }
  .r-section-title {
    font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 700;
    color: var(--navy); margin-bottom: 7px;
    padding-left: 9px; border-left: 3px solid var(--gold); display: block;
  }
  .r-item {
    display: flex; gap: 7px; padding: 5px 0 5px 12px;
    font-size: 13.5px; line-height: 1.7;
    border-bottom: 1px dashed var(--cream-dark); align-items: flex-start;
  }
  .r-item:last-child { border-bottom: none; }
  .r-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 9px; }
  .diff-badge {
    display: inline-block; padding: 1px 9px; border-radius: 12px;
    font-size: 11px; font-weight: 700; margin-left: 4px;
  }
  .diff-high { background: #fde8e8; color: #c0392b; }
  .diff-mid  { background: #fff3cd; color: #856404; }
  .diff-low  { background: #d4edda; color: #155724; }

  /* CTA */
  .cta-card {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    border-radius: 14px; padding: 18px 20px; color: #fff; margin-top: 13px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .cta-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 700; color: #fff; }
  .cta-card p { font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.85); }
  .cta-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .cta-btn {
    flex: 1; min-width: 130px; background: var(--gold); color: var(--navy); border: none;
    padding: 11px 14px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    text-align: center; text-decoration: none; display: block; letter-spacing: 0.03em;
  }
  .cta-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .cta-btn.outline { background: transparent; border: 1.5px solid rgba(196,147,63,0.6); color: var(--gold-light); }
  .cta-btn.outline:hover { background: rgba(196,147,63,0.12); }
  .cta-note { font-size: 10px; color: rgba(255,255,255,0.4); text-align: center; }

  /* Input */
  .input-area {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 720px;
    background: rgba(250,247,242,0.97); backdrop-filter: blur(8px);
    border-top: 1px solid var(--border); padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .input-wrap {
    flex: 1; background: #fff; border: 1.5px solid var(--border);
    border-radius: 24px; display: flex; align-items: center; padding: 0 14px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--navy); }
  .input-wrap input {
    flex: 1; border: none; outline: none;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    padding: 10px 0; background: transparent; color: var(--text);
  }
  .input-wrap input::placeholder { color: #bbb; }
  .send-btn {
    width: 40px; height: 40px; background: var(--navy); border: none;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--navy-light); transform: scale(1.05); }
  .send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 17px; height: 17px; fill: #fff; }

  /* Typing */
  .typing {
    display: flex; align-items: center; gap: 5px; padding: 13px 16px;
    background: var(--ai-bg); border: 1px solid var(--border);
    border-radius: 16px; border-top-left-radius: 4px; width: fit-content; box-shadow: var(--shadow);
  }
  .dot { width: 7px; height: 7px; background: var(--navy); border-radius: 50%; animation: bounce 1.2s infinite; opacity: 0.5; }
  .dot:nth-child(2){ animation-delay: 0.2s; }
  .dot:nth-child(3){ animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100%{ transform:translateY(0); opacity:0.5; }
    30%{ transform:translateY(-5px); opacity:1; }
  }

  .disclaimer { font-size: 11px; color: var(--text-light); text-align: center; padding: 12px 16px 4px; line-height: 1.7; }
  .restart-btn {
    background: none; border: 1px solid var(--border); color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 5px 14px;
    border-radius: 16px; cursor: pointer; margin: 10px auto 0; display: block; transition: all 0.2s;
  }
  .restart-btn:hover { border-color: var(--navy); color: var(--navy); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚖️</div>
  <div class="header-text">
    <h1>司法書士藤井真司事務所</h1>
    <p>相続かんたん診断 AI | 無料・匿名</p>
  </div>
  <div class="header-tel">
    <a href="tel:0927134900">📞 092-713-4900</a>
    <span>平日 9:00〜17:00</span>
  </div>
</div>

<div class="main">
  <div class="intro-card">
    <h2>相続のお悩み、まず診断してみましょう</h2>
    <p>いくつかの質問にお答えいただくだけで、必要な手続きや専門家への相談が必要かどうかを無料でお調べできます。</p>
    <div class="steps">
      <div class="step"><div class="step-num">1</div>状況を入力</div>
      <div class="step"><div class="step-num">2</div>AIが分析</div>
      <div class="step"><div class="step-num">3</div>手続きを確認</div>
      <div class="step"><div class="step-num">4</div>無料相談へ</div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>
  <p class="disclaimer">※この診断は一般的な情報提供を目的としており、法律的なアドバイスではありません。詳細は専門家にご相談ください。</p>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="userInput" placeholder="メッセージを入力（戻りたい時もこちらへ）…" />
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// =============================================
//  設定
// =============================================
const OFFICE_NAME = '司法書士藤井真司事務所';
const OFFICE_TEL  = '092-713-4900';
const OFFICE_URL  = '#contact'; // ← お問い合わせページのURLに変更してください

const SYSTEM_PROMPT = `あなたは「${OFFICE_NAME}」の相続かんたん診断AIです。
相続について不安を抱えるユーザーに対し、親切・丁寧・わかりやすく対応してください。

【最重要ルール：トリガーワード】
分岐を伴うすべての質問では、回答の末尾に必ず指定のトリガーワード（【〇〇】形式）を付けてください。
トリガーワードがないと選択肢ボタンが表示されず、ユーザーが困惑します。必ず指示通りのトリガーを付けてください。
1つの返答で質問するのは1つだけ。複数質問を同時にしないこと。

【会話の前提となる重要ルール】
1. 相談者ご自身が必ずしも相続人とは限りません。家族の代理で相談されている方、ご友人やお知り合いの件で相談されている方もいらっしゃいます。
2. 質問の主語は必ず明確にしてください。「配偶者は？」ではなく「亡くなられたお父様に配偶者（奥様）はいらっしゃいましたか？」のように、誰の配偶者・誰の子どもかを毎回明示します。
3. 一度確定した情報（被相続人が誰か、相談者の立場など）は、後の質問で前提として活用し、矛盾した質問をしないでください。

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【診断ステップ】
━━━━━━━━━━━━━━━━━━━━━━━━━━━━

■ STEP 0：ご相談の目的を確認
最初の質問として「ご相談ありがとうございます。今回はどのような状況でご相談されていますか？【相談目的】」と聞いてください。

選択肢の処理：
・「身近な方が亡くなり、相続手続きを知りたい」→ STEP 1へ
・「将来に備えて生前準備を知りたい」→ 生前対策の案内（公正証書遺言、家族信託、生前贈与、任意後見など概要を簡潔に紹介）をして、無料相談をご案内し診断終了
・「家族の代わりに調べている」→ STEP 1へ（※相談者本人が相続人かどうかは後で確認）
・「その他・まだ決めていない」→ STEP 1へ

■ STEP 1：相談者の立場を確認
「お悔やみ申し上げます。あなたご自身は、亡くなられた方とどのようなご関係ですか？【立場確認】」

選択肢の処理：
・「配偶者（夫・妻）」→ 被相続人は自動的に夫または妻と確定。STEP 2-1（被相続人情報）はスキップしSTEP 2-2へ
・「子（息子・娘）」→ STEP 2-1へ進み、亡くなった親が父か母か両方かを確認
・「親」→ 被相続人はお子様と確定。STEP 2-1はスキップしSTEP 2-2へ。「お子様を亡くされ、心よりお悔やみ申し上げます」と一言添えること
・「兄弟姉妹」→ 被相続人はご兄弟・ご姉妹と確定。STEP 2-1はスキップしSTEP 2-2へ
・「孫」→ 被相続人は祖父母と確定。STEP 2-1はスキップしSTEP 2-2へ
・「その他の親族（甥姪・いとこなど）」→ STEP 2-1へ進み、関係性を補足質問
・「親族以外（友人・知人など）」→ 通常診断は行わず、以下のメッセージで診断終了：
  「ご友人・お知り合いの方の件でご相談いただきありがとうございます。
   親族以外の方からのご相談は、遺贈・特別縁故者・債権者対応など状況により対応が大きく変わるため、
   AI診断ではなく、直接当事務所の司法書士にご相談いただくのが確実です。
   無料相談を承っております（📞 ${OFFICE_TEL}）。」

■ STEP 2-1：被相続人の特定（立場が「子」の場合のみ）
「亡くなられたのはお父様ですか、お母様ですか、それともご両方でしょうか？【父母選択】」

選択肢の処理：
・「父が亡くなった」「母が亡くなった」→ STEP 2-2へ
・「父母両方が亡くなった」→ 数次相続の可能性を一言補足し、STEP 2-2へ進む

■ STEP 2-2：被相続人の配偶者を確認（主語を必ず明示）
例（被相続人が父の場合）：「亡くなられたお父様には、配偶者（お母様）はいらっしゃいましたか？【配偶者確認】」
例（被相続人が兄弟の場合）：「亡くなられたご兄弟様には、配偶者はいらっしゃいましたか？【配偶者確認】」
※相談者自身が配偶者本人の場合はこのSTEPはスキップ

■ STEP 2-3：被相続人の子どもの人数を確認（主語を必ず明示）
例（被相続人が父の場合）：「亡くなられたお父様には、お子様は何人いらっしゃいましたか？（あなたを含めた人数を教えてください）【子ども人数】」
例（被相続人が兄弟の場合）：「亡くなられたご兄弟様には、お子様（あなたから見て甥御さん・姪御さん）はいらっしゃいましたか？【子ども人数】」

■ STEP 2-4：被相続人の両親の生存（被相続人に子がいない場合のみ）
「亡くなられた方のご両親はご健在ですか？【両親確認】」

■ STEP 2-5：被相続人の兄弟姉妹（被相続人に子も親もいない場合のみ）
「亡くなられた方にご兄弟姉妹はいらっしゃいましたか？【兄弟確認】」
※「すでに亡くなった兄弟がいる」が選ばれた場合は、その兄弟にお子様（被相続人から見て甥姪）がいるか確認し、代襲相続の可能性に触れること

■ STEP 2.5：法定相続人の中間サマリー（重要）
ここまでの情報をもとに、法定相続人を以下の形式で要約してください（トリガーワード不要）：
「ここまでのお話を整理すると、法律で定められた相続人（法定相続人）は以下の方々と推定されます：
・配偶者：〇〇様
・お子様：〇名
（その他該当者）

合計〇名が相続人となる見込みです。
情報に間違いがなければ、続いて財産についてお伺いします。」

■ STEP 3：財産の種類を確認
必ず次の形式で返答：「財産の種類を教えてください。当てはまるものをすべて選んでください。【財産選択】」
「財産の種類：〇〇、〇〇」と既に回答済みの場合はこのステップをスキップ

■ STEP 4：借金・負債の確認

【重要：STEP 3の回答を必ず踏まえて、重複質問を避けること】

▼ パターンA：STEP 3で「💳 借金・負債」が選択されている場合
　借金の有無は確認済みなので、有無は聞かず、いきなり規模を聞く：
　「先ほど借金・負債があるとのことでしたので、おおよその規模を教えてください。【借金規模】」

▼ パターンB：STEP 3で「💳 借金・負債」が選択されていない場合
　念のため確認する：
　「念のための確認ですが、他にお気づきでない借金やローン、保証債務などはございませんか？（カードローンや連帯保証なども含みます）【債務確認】」
　→ 「ある」の場合 → 「おおよその借金の規模を教えてください。【借金規模】」

▼ パターンC：STEP 3で「❓ よくわからない」が選択されている場合
　通常確認：
　「亡くなられた方に、借金やローン、保証債務などはございましたか？【債務確認】」
　→ 「ある」の場合 → 「おおよその借金の規模を教えてください。【借金規模】」

【借金規模が大きい場合の早期警告】
規模が「数百万円〜1000万円」「1000万円以上」の場合、ここで以下を必ず伝える：
「⚠️ ご注意：相続放棄は『相続の開始を知った日から3か月以内』に家庭裁判所への申述が必要です。財産より借金が多そうな場合は、早めの判断が重要です。詳しい手続きは診断結果でもご案内します。」

■ STEP 5：遺言書の有無を確認
「遺言書は見つかっていますか？【遺言確認】」

■ STEP 6：遺産分割協議の見通しを確認
「相続人の皆様で遺産分割について話し合うことはできそうですか？【協議確認】」

■ STEP 7：認知症・判断能力の確認
「相続人の中に、認知症などで判断が難しい方はいらっしゃいますか？【後見確認】」

■ STEP 8：診断結果を出す

【診断結果の形式】
冒頭に必ず「【診断結果】」と記載し、以下の項目を含めること：
■ 推定される法定相続人（STEP 2.5の情報を改めて整理）
■ 必要と思われる主な手続き（箇条書き・具体的に。例：相続人調査、遺産分割協議書の作成、不動産の相続登記、預貯金の解約手続き等）
■ 手続きの難易度と理由（難易度：高／中／低を明記）
■ 相続放棄の検討要否（必要な場合は3か月の期限を明記）
■ 司法書士への相談を特にお勧めするポイント
■ 注意すべき期限や落とし穴
　・相続放棄：3か月以内
　・相続税申告：10か月以内
　・相続登記の義務化（令和6年4月〜）：3年以内

末尾に必ず：「${OFFICE_NAME}では無料相談を承っております。お気軽にお問い合わせください。」

【会話ルール】
・専門用語は必ずかみ砕いて説明する（例：「法定相続人」→「法律で定められた相続人」）
・不安を煽らず、温かみのある対応を心がける
・法律の断定的判断は避け「一般的には」「場合によりますが」などの表現を使う
・各回答は200文字以内を目安に簡潔に（診断結果のみ長くてOK）
・前置きは短めに、質問に集中する
・トリガーワードは必ず回答の末尾に記載すること
・「わからない」と回答された際は、「戸籍を取り寄せると確認できます」「故人の郵便物や通帳を確認するとわかる場合があります」など、軽い補足説明を添えて安心感を与える
・既に確認済みの情報を再度尋ねない（例：相談者が配偶者と確定している場合、「配偶者はいますか？」とは聞かない）`;

// =============================================
//  財産選択オプション
// =============================================
const ASSET_OPTIONS = [
  { id: 'land',   emoji: '🏠', label: '不動産',        sub: '土地・建物・マンション' },
  { id: 'bank',   emoji: '💰', label: '預貯金',        sub: '銀行・ゆうちょ口座' },
  { id: 'stock',  emoji: '📈', label: '株式・有価証券',  sub: '上場株・投資信託など' },
  { id: 'car',    emoji: '🚗', label: '自動車・動産',   sub: '車・貴金属・美術品など' },
  { id: 'biz',    emoji: '🏢', label: '事業・会社持分', sub: '自営業・非上場株式など' },
  { id: 'debt',   emoji: '💳', label: '借金・負債',    sub: 'ローン・連帯保証など' },
  { id: 'other',  emoji: '📦', label: 'その他',        sub: '年金・生命保険など' },
  { id: 'unsure', emoji: '❓', label: 'よくわからない', sub: 'あとで確認できます' },
];

// =============================================
//  状態
// =============================================
let messages  = [];
let isLoading = false;
let assetShown = false;

// =============================================
//  UIヘルパー
// =============================================
function addMessage(role, content, isHTML = false) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'ai' ? '⚖️' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  isHTML ? (bubble.innerHTML = content) : (bubble.textContent = content);

  div.appendChild(av);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return bubble;
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typingIndicator';
  const av = document.createElement('div');
  av.className = 'msg-avatar'; av.textContent = '⚖️';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(av); div.appendChild(t);
  document.getElementById('chatArea').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function removeTyping() { document.getElementById('typingIndicator')?.remove(); }
function removeChoiceBar() { document.getElementById('choiceBar')?.remove(); }

// ===== 単一選択ボタン =====
function addChoiceButtons(choices) {
  removeChoiceBar();
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'choiceBar'; div.style.paddingLeft = '44px';

  const wrap = document.createElement('div');
  wrap.className = 'choices';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn'; btn.textContent = c;
    btn.onclick = () => { removeChoiceBar(); processUserInput(c); };
    wrap.appendChild(btn);
  });
  div.appendChild(wrap);
  chatArea.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ===== 財産複数選択UI =====
function addAssetPicker() {
  removeChoiceBar();

  const chatArea = document.getElementById('chatArea');
  const outer = document.createElement('div');
  outer.id = 'choiceBar'; outer.style.paddingLeft = '44px';
  outer.style.animation = 'fadeUp 0.35s ease';

  const picker = document.createElement('div');
  picker.className = 'asset-picker';

  const title = document.createElement('div');
  title.className = 'asset-picker-title';
  title.innerHTML = '☑️ 当てはまるものを<strong>すべて</strong>選んでください（複数選択可）';
  picker.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'asset-grid';
  const selected = new Set();

  ASSET_OPTIONS.forEach(opt => {
    const item = document.createElement('label');
    item.className = 'asset-item';
    item.innerHTML = `
      <input type="checkbox" value="${opt.id}">
      <div class="asset-check"></div>
      <div>
        <div class="asset-label">${opt.emoji} ${opt.label}</div>
        <div class="asset-sub">${opt.sub}</div>
      </div>`;

    item.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) {
        if (opt.id === 'unsure') {
          selected.clear(); selected.add('unsure');
          grid.querySelectorAll('.asset-item').forEach(el => {
            if (el !== item) {
              el.classList.remove('selected');
              el.querySelector('.asset-check').textContent = '';
              el.querySelector('input').checked = false;
            }
          });
        } else {
          const u = grid.querySelector('input[value="unsure"]');
          if (u && u.checked) {
            u.checked = false;
            u.closest('.asset-item').classList.remove('selected');
            u.closest('.asset-item').querySelector('.asset-check').textContent = '';
            selected.delete('unsure');
          }
          selected.add(opt.id);
        }
        item.classList.add('selected');
        item.querySelector('.asset-check').textContent = '✓';
      } else {
        selected.delete(opt.id);
        item.classList.remove('selected');
        item.querySelector('.asset-check').textContent = '';
      }
      confirmBtn.disabled = selected.size === 0;
    });
    grid.appendChild(item);
  });
  picker.appendChild(grid);

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'asset-confirm';
  confirmBtn.textContent = '選択内容を確認する →';
  confirmBtn.disabled = true;
  confirmBtn.onclick = () => {
    const labels = [...selected].map(id => ASSET_OPTIONS.find(o => o.id === id)?.label).filter(Boolean);
    outer.remove();
    processUserInput(`財産の種類：${labels.join('、')}`);
  };
  picker.appendChild(confirmBtn);
  outer.appendChild(picker);
  chatArea.appendChild(outer);
  outer.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ===== 診断結果カード =====
function formatResult(text) {
  const body = text.replace('【診断結果】', '').trim();
  const lines = body.split('\n').filter(l => l.trim());

  let html = '<div class="result-card"><div class="result-header"><span>📋 診断結果</span></div><div class="result-body">';
  let inSection = false;

  lines.forEach(line => {
    const t = line.trim();
    if (t.startsWith('■')) {
      if (inSection) html += '</div>';
      html += `<div class="r-section"><div class="r-section-title">${t.replace(/^■\s*/, '')}</div>`;
      inSection = true;
    } else if (t.startsWith('・') || t.startsWith('•') || t.startsWith('→') || t.startsWith('─')) {
      const content = t.replace(/^[・•→─]\s*/, '');
      let badge = '';
      if (/難易度[：:]\s*高/.test(content) || content.includes('難しい')) badge = '<span class="diff-badge diff-high">難易度：高</span>';
      else if (/難易度[：:]\s*中/.test(content)) badge = '<span class="diff-badge diff-mid">難易度：中</span>';
      else if (/難易度[：:]\s*低/.test(content)) badge = '<span class="diff-badge diff-low">難易度：低</span>';
      html += `<div class="r-item"><div class="r-dot"></div><div>${content}${badge}</div></div>`;
    } else if (t) {
      html += `<div style="padding:3px 0 3px ${inSection ? '12px' : '0'};font-size:13.5px;line-height:1.8;">${t}</div>`;
    }
  });
  if (inSection) html += '</div>';
  html += '</div></div>';

  html += `
  <div class="cta-card" style="margin-top:13px;">
    <div class="cta-title">🏛️ ${OFFICE_NAME}</div>
    <p>診断結果についてご不明な点や、より詳しい手続きについては<strong>無料相談</strong>でお気軽にご相談ください。初回相談料は無料です。</p>
    <div class="cta-btns">
      <a href="tel:${OFFICE_TEL.replace(/-/g,'')}" class="cta-btn">📞 ${OFFICE_TEL}</a>
      <a href="${OFFICE_URL}" class="cta-btn outline">✉️ ネット予約・お問合せ</a>
    </div>
    <p class="cta-note">相談料無料・秘密厳守・オンライン対応可</p>
  </div>
  <button class="restart-btn" onclick="restartChat()">🔄 最初からやり直す</button>`;

  return html;
}

// =============================================
//  メイン処理
// =============================================
async function processUserInput(text) {
  if (isLoading) return;
  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'エラーが発生しました。';
    removeTyping();
    messages.push({ role: 'assistant', content: reply });

    const isResult = reply.includes('【診断結果】') ||
      (reply.includes('必要な手続き') && reply.includes('難易度'));

    if (isResult) {
      addMessage('ai', formatResult(reply), true);
    } else {
      const TRIGGERS = {
        '【相談目的】':   ['身近な方が亡くなり、相続手続きを知りたい', '将来に備えて生前準備を知りたい', '家族の代わりに調べている', 'その他・まだ決めていない'],
        '【立場確認】':   ['配偶者（夫・妻）', '子（息子・娘）', '親', '兄弟姉妹', '孫', 'その他の親族', '親族以外（友人・知人など）'],
        '【父母選択】':   ['父が亡くなった', '母が亡くなった', '父母両方が亡くなった'],
        '【配偶者確認】': ['いらっしゃる（健在）', 'いらっしゃった（既に死別）', 'いらっしゃらない（離別・未婚）'],
        '【子ども人数】': ['いない', '1人', '2人', '3人', '4人以上'],
        '【両親確認】':   ['両親とも健在', '片方だけ健在', '両方とも逝去', 'わからない'],
        '【兄弟確認】':   ['兄弟姉妹がいる', '兄弟姉妹はいない', 'すでに亡くなった兄弟がいる', 'わからない'],
        '【債務確認】':   ['ある', 'ない', 'わからない'],
        '【借金規模】':   ['数十万円程度', '数百万円〜1000万円', '1000万円以上', 'よくわからない'],
        '【遺言確認】':   ['自筆の遺言書がある', '公正証書遺言がある', '遺言書はない', '確認していない'],
        '【協議確認】':   ['円満に話し合えそう', '揉める可能性がある', '連絡が取れない相続人がいる', 'わからない'],
        '【後見確認】':   ['該当者はいない', '相続人に認知症の方がいる', '被相続人が認知症だった', 'わからない'],
      };

      let displayReply = reply;
      Object.keys(TRIGGERS).forEach(t => { displayReply = displayReply.replace(t, ''); });
      displayReply = displayReply.replace('【財産選択】', '').trim();

      addMessage('ai', displayReply);

      const r = reply;

      if (!assetShown && r.includes('【財産選択】')) {
        assetShown = true;
        addAssetPicker();
      } else {
        let matched = false;
        for (const [trigger, choices] of Object.entries(TRIGGERS)) {
          if (r.includes(trigger)) {
            addChoiceButtons(choices);
            matched = true;
            break;
          }
        }
        if (!matched && (r.includes('ますか') || r.includes('でしょうか') || r.includes('ましたか'))) {
          addChoiceButtons(['はい', 'いいえ', 'わかりません']);
        }
      }
    }

  } catch (err) {
    removeTyping();
    addMessage('ai', `ただいまシステムに接続できません。お手数ですが、お電話（${OFFICE_TEL}）またはしばらく後に再度お試しください。`);
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  removeChoiceBar();
  processUserInput(text);
}
document.getElementById('userInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

function restartChat() {
  messages = []; assetShown = false;
  document.getElementById('chatArea').innerHTML = '';
  initChat();
}

// =============================================
//  初期化
// =============================================
async function initChat() {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  await new Promise(r => setTimeout(r, 700));
  removeTyping();

  const opening = `はじめまして。${OFFICE_NAME}の相続かんたん診断AIです😊\n\nご相続のお手続きについて、いくつかお伺いしながら、必要な手続きをわかりやすくご説明します。最後に診断結果もお伝えします。\n\n💬 入力の途中で間違えたり戻りたい時は、画面下のプロンプトバーにご自身の言葉でご指示ください。AIが丁寧にご案内します。\n\n\nまず最初にお聞きします。今回はどのような状況でご相談されていますか？`;

  addMessage('ai', opening);
  messages.push({ role: 'assistant', content: opening });
  addChoiceButtons(['身近な方が亡くなり、相続手続きを知りたい', '将来に備えて生前準備を知りたい', '家族の代わりに調べている', 'その他・まだ決めていない']);

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

initChat();
</script>
